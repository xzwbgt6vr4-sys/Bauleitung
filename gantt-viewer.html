<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="desch Gantt">
<title>Gantt Viewer · desch architekten</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<meta name="theme-color" content="#A80000">
<style>
:root {
  --ink:#1a1a1a; --ink-2:#444; --ink-3:#888;
  --paper:#f5f2ed; --paper-2:#ece8e0; --paper-3:#e0dbd0;
  --accent:#A80000; --card:#faf8f4;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:14px; --radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --row-h: 24px;
  --hdr-h: 96px;
  --left-w: 220px;
}
[data-theme="dark"]{
  --ink:#f0ede8; --ink-2:#c8c4bc; --ink-3:#888880;
  --paper:#1a1918; --paper-2:#242220; --paper-3:#2e2c28; --card:#1f1e1c;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
[data-theme="dark"] body{background:#141312}
[data-theme="dark"] header,[data-theme="dark"] #zbar,[data-theme="dark"] #lp,
[data-theme="dark"] #tlhdr,[data-theme="dark"] #lp-hdr{background:#1a1918!important;border-color:#2e2c28!important}
[data-theme="dark"] .sticky-top{background:#1a1918}
[data-theme="dark"] #chart{background:#141312}
[data-theme="dark"] .gr.alt{background:rgba(255,255,255,.03)}
[data-theme="dark"] .gl.maj{background:rgba(255,255,255,.1)}
[data-theme="dark"] .gl.min{background:rgba(255,255,255,.05)}
[data-theme="dark"] .wknd{background:rgba(255,255,255,.025)}
[data-theme="dark"] .tl.mo{color:var(--ink-2)}
[data-theme="dark"] .tl.sub{color:var(--muted,#888)}
[data-theme="dark"] #div-handle{background:#242220;border-color:#3a3836}
[data-theme="dark"] .modal-overlay{background:rgba(0,0,0,.7)}
[data-theme="dark"] .modal-sheet{background:#1a1918}
[data-theme="dark"] .field-input{background:#242220;border-color:#2e2c28;color:var(--ink)}
[data-theme="dark"] #leg{background:#1f1e1c;border-color:#2e2c28}
[data-theme="dark"] #tip{background:#1f1e1c;border-color:#2e2c28}

/* ── PALETTE (10 Gantt-Farben) ── */
.gc0{background:#A80000}.gc1{background:#d35400}.gc2{background:#c57b00}
.gc3{background:#5d8a27}.gc4{background:#1e8449}.gc5{background:#1a7a6e}
.gc6{background:#1a5a8c}.gc7{background:#5b3a9e}.gc8{background:#8e3090}
.gc9{background:#555}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:'Arial Narrow',Arial,sans-serif;background:var(--paper);color:var(--ink);height:100vh;width:100vw;overflow:hidden}

/* ── HEADER ── */
.sticky-top{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;-webkit-transform:translateZ(0)}
header{background:#fff;padding:calc(var(--safe-top) + 12px) 16px 8px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--paper-3)}
.hdr-left{flex:1;min-width:0}
.hdr-logo-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pro-badge{font-family:'Permanent Marker',cursive;font-size:20px;font-weight:900;color:#00A8A8;line-height:1;transform:rotate(-20deg);display:inline-block;margin-left:4px;margin-top:2px}
.hdr-logo{width:260px;height:32px;flex-shrink:0}
.hdr-logo svg{display:block;width:100%;height:100%}
.hdr-sub{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-sub .proj-name{color:var(--ink-2);font-weight:600;letter-spacing:.3px}
.hdr-btn{background:var(--accent);color:#fff;border:none;padding:7px 13px;border-radius:20px;font-size:20px;font-weight:600;font-family:'Arial Narrow',Arial,sans-serif;cursor:pointer;line-height:1;flex-shrink:0}
.hdr-btn:active{opacity:.75}

/* ── ZOOM BAR ── */
#zbar {
  position:fixed;top:var(--hdr-h);left:0;right:0;z-index:95;
  background:#fff;
  border-bottom:1px solid var(--paper-3);
  display:none;align-items:center;justify-content:space-between;
  padding:0 10px;
  height:36px;gap:4px;
}
#zbar.on{display:flex}
/* zoom bar controls */
.zmodeBtn{background:none;border:1.5px solid var(--paper-3);border-radius:20px;
  color:var(--ink-3);cursor:pointer;padding:3px 9px;
  font-size:11px;font-family:'Arial Narrow',Arial,sans-serif;letter-spacing:.04em;
  transition:all .15s;white-space:nowrap;flex-shrink:0}
.zmodeBtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.zbtn{background:none;border:1.5px solid var(--paper-3);border-radius:50%;
  color:var(--ink-3);cursor:pointer;width:26px;height:26px;
  font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;font-weight:300}
.zbtn:active{background:var(--paper-2);color:var(--accent)}
.zsep{width:1px;height:18px;background:var(--paper-3);flex-shrink:0;margin:0 2px}

#zslider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;border-radius:2px;
  background:var(--paper-3);outline:none;cursor:pointer;
}
#zslider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:#fff;border:2px solid var(--accent);
  box-shadow:0 1px 4px rgba(0,0,0,0.12);cursor:pointer;
}
#zslider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:#fff;border:2px solid var(--accent);
  box-shadow:0 1px 4px rgba(0,0,0,0.12);cursor:pointer;
}


/* ── EMPTY STATE ── */
#empty{
  height:calc(100vh - var(--hdr-h));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:32px;text-align:center;
}
.e-icon{font-size:44px;opacity:.5}
.e-title{font-size:18px;font-weight:700}
.e-sub{font-size:13px;color:var(--ink-3);max-width:300px;line-height:1.65}
.e-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);
  padding:13px 24px;font-family:'Arial Narrow',Arial,sans-serif;font-size:15px;
  font-weight:700;cursor:pointer;margin-top:6px}
.e-btn:active{opacity:.8}
.e-note{font-size:11px;color:var(--ink-3);letter-spacing:.06em}

/* ── GANTT WRAPPER ── */
#gwrap{
  display:none;position:fixed;
  top:calc(var(--hdr-h) + 36px);left:0;right:0;bottom:0;
}
#gwrap.on{display:block}

/* LEFT PANEL */
#lp{
  position:absolute;top:0;left:0;bottom:0;width:var(--left-w);
  border-right:2px solid var(--paper-3);background:#fff;
  overflow-y:hidden;overflow-x:hidden;z-index:10;
}

/* TIMELINE HEADER */
#tlhdr{
  position:absolute;top:0;left:var(--left-w);right:0;height:38px;
  background:var(--paper-2);border-bottom:1px solid var(--paper-3);
  overflow:hidden;z-index:9;
}
#tli{position:absolute;top:0;left:0;height:38px}

/* CHART */
#chart{
  position:absolute;top:38px;left:var(--left-w);right:0;bottom:0;
  overflow:scroll;-webkit-overflow-scrolling:touch;
  background:var(--paper);
}
#chart::-webkit-scrollbar{display:none}
#cin{position:relative}

/* TASK ROW */
.tr{
  height:var(--row-h);display:flex;align-items:center;
  border-bottom:1px solid var(--paper-3);padding:0 10px 0 0;
  gap:4px;cursor:pointer;user-select:none;transition:background .1s;
}
.tr:active,.tr.sel{background:rgba(168,0,0,.06)}
.tr-arr{flex-shrink:0;width:14px;color:var(--ink-3);font-size:9px;text-align:center;line-height:1}
.tr-n{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.tr.l0 .tr-n{font-weight:700;font-size:12px;color:var(--ink)}
.tr.l1 .tr-n{font-weight:600;color:var(--ink-2)}
.tr.l2 .tr-n{color:var(--ink-2)}
.tr.l3 .tr-n,.tr.l4 .tr-n,.tr.l5 .tr-n{color:var(--ink-3);font-size:10.5px}
.tr.ms .tr-n{color:var(--accent);font-style:italic}
.tr .tr-arr{transition:color .15s;cursor:pointer;width:18px}
.tr .tr-arr:hover{color:var(--accent)}
.tr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:2px}

/* GANTT ROWS */
.gr{position:absolute;left:0;right:0;height:var(--row-h);border-bottom:1px solid rgba(224,219,208,.7)}
.gr.alt{background:rgba(236,232,224,.35)}
.wknd{position:absolute;top:0;bottom:0;background:rgba(168,0,0,.03);pointer-events:none;z-index:0}
.gl{position:absolute;top:0;bottom:0;width:1px;pointer-events:none}
.gl.maj{background:rgba(180,174,164,.5)}
.gl.min{background:rgba(224,219,208,.6)}

/* TODAY LINE */
#today-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:var(--accent);opacity:.7;z-index:6;pointer-events:none;
}
#today-line::after{
  content:'heute';position:absolute;top:3px;left:3px;
  font-size:9px;color:var(--accent);white-space:nowrap;
  font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;letter-spacing:.04em;
}

/* BAR */
.bar{
  position:absolute;border-radius:3px;cursor:pointer;z-index:3;
  display:flex;align-items:center;overflow:hidden;transition:filter .15s;
  top:5px;height:calc(var(--row-h) - 10px);
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.bar:active{filter:brightness(.85)}
.bar.sm{top:3px;height:calc(var(--row-h) - 8px);border-radius:2px;opacity:.9}
.blbl{font-size:9px;font-weight:700;padding:0 5px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;pointer-events:none;
  font-family:'Arial Narrow',Arial,sans-serif;letter-spacing:.04em}
.bprog{position:absolute;left:0;top:0;bottom:0;
  background:rgba(0,0,0,.2);pointer-events:none;border-radius:3px 0 0 3px}

/* MILESTONE */
.msd{position:absolute;z-index:4;cursor:pointer;
  width:10px;height:10px;transform:rotate(45deg);
  box-shadow:0 1px 4px rgba(0,0,0,.2)}
.msd:active{filter:brightness(.8)}

/* DEPS */
#dsvg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:2}
.dep{fill:none;stroke-width:1.2;opacity:.4}
.dep.hi{opacity:.9;stroke-width:1.8}

/* TIMELINE LABELS */
.tl{position:absolute;pointer-events:none;white-space:nowrap;font-family:'Arial Narrow',Arial,sans-serif}
.tl.mo{bottom:20px;font-size:11px;font-weight:700;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase}
.tl.sub{bottom:4px;font-size:9px;color:var(--ink-3)}
.tl.mo-border{position:absolute;top:0;bottom:0;width:1px;background:var(--paper-3);pointer-events:none}

/* ── TOOLTIP (Card-Style) ── */
#tip{
  position:fixed;z-index:300;pointer-events:none;
  background:var(--card);border:1px solid var(--paper-3);border-radius:var(--radius-sm);
  padding:10px 13px;max-width:240px;opacity:0;
  transition:opacity .12s;box-shadow:var(--shadow);
  font-family:'Arial Narrow',Arial,sans-serif;
}
#tip.on{opacity:1}
.tn{font-size:13px;font-weight:700;margin-bottom:5px;line-height:1.3;color:var(--ink)}
.tr2{display:flex;gap:6px;margin-top:2px}
.tk{font-size:11px;color:var(--ink-3);min-width:58px}
.tv{font-size:11px;color:var(--ink);font-weight:600}
.tsec{margin-top:6px;padding-top:6px;border-top:1px solid var(--paper-3)}
.tsh{font-size:9px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;font-weight:700}
.tdep{font-size:11px;color:var(--accent);line-height:1.6}
.tnote{font-size:11px;color:var(--ink-3);line-height:1.5}
.tprog-wrap{height:5px;background:var(--paper-3);border-radius:3px;overflow:hidden;margin-top:5px}
.tprog-fill{height:100%;border-radius:3px;background:var(--accent)}

/* ── LEGEND CARD ── */
#leg{
  position:fixed;right:12px;
  bottom:calc(12px + env(safe-area-inset-bottom,0px));
  z-index:50;background:var(--card);
  border:1px solid var(--paper-3);border-radius:var(--radius-sm);
  padding:8px 11px;display:none;flex-direction:column;gap:5px;
  min-width:120px;box-shadow:var(--shadow);
}
#leg.on{display:flex}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-3);
  font-family:'Arial Narrow',Arial,sans-serif}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 20px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;z-index:999;
  white-space:nowrap;pointer-events:none;font-family:'Arial Narrow',Arial,sans-serif}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEFT PANEL HEADER (label row) */
#lp-hdr{
  height:38px;display:flex;align-items:center;
  padding:0 10px;background:var(--paper-2);
  border-bottom:1px solid var(--paper-3);
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--ink-3);
  font-family:'Arial Narrow',Arial,sans-serif;
}

/* ── DIVIDER LINE (fixed vertical separator) ── */
#div-line{
  position:absolute;top:0;bottom:0;
  width:2px;
  left:calc(var(--left-w) - 1px);
  z-index:15;
  background:var(--paper-3);
  pointer-events:none;
  display:none;
}
#gwrap.on #div-line{display:block}

/* ── DIVIDER HANDLE (scrolls with chart vertically) ── */
#div-handle{
  position:fixed;
  left:calc(var(--left-w) - 16px);
  top:50vh;
  transform:translateY(-50%);
  width:32px;
  height:44px;
  z-index:25;
  cursor:col-resize;
  display:none;
  background:#fff;
  border:1.5px solid var(--paper-3);
  border-radius:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  touch-action:none;
  transition:left 0s, border-color .15s, box-shadow .15s;
}
#div-handle:hover,
#div-handle.dragging{
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(168,0,0,0.18);
}
/* three horizontal grip lines */
#div-handle::before{
  content:'';
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:12px;
  height:16px;
  background:
    linear-gradient(var(--ink-3) 1px, transparent 1px) 0 0/12px 5px repeat-y,
    linear-gradient(var(--ink-3) 1px, transparent 1px) 0 2px/12px 5px repeat-y;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      var(--ink-3) 3px,
      var(--ink-3) 4.5px,
      transparent 4.5px,
      transparent 8px
    );
  opacity:.35;
}
#div-handle:hover::before,
#div-handle.dragging::before{ opacity:.7; }
#gwrap.on #div-handle{display:block}

/* cursor during drag */
body.col-resizing, body.col-resizing *{ cursor:col-resize !important; user-select:none !important; }

/* ── FULLSCREEN MODE ── */
body.fs header{ display:none !important }
body.fs #gwrap{
  top:36px !important;   /* zbar only */
}
/* zbar stays, but push it to top:0 in fullscreen */
body.fs #zbar{ top:0 !important }
#btn-fs{ font-size:17px; line-height:1 }
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 24px);
  width:100%;max-height:88vh;overflow-y:auto;
  animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--paper-3);
  border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--ink-3);margin-bottom:8px;
  font-family:'Arial Narrow',Arial,sans-serif}
.field-row{margin-bottom:10px}
.field-label{font-size:11px;font-weight:600;color:var(--ink-2);display:block;
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field-input{width:100%;padding:10px 12px;border:1.5px solid var(--paper-3);
  border-radius:var(--radius-sm);font-size:14px;
  font-family:'Arial Narrow',Arial,sans-serif;
  background:var(--card);color:var(--ink);outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--accent)}
.seg-ctrl{display:flex;border:1.5px solid var(--paper-3);border-radius:var(--radius-sm);overflow:hidden}
.seg-btn{flex:1;background:none;border:none;padding:8px 4px;font-size:12px;
  font-family:'Arial Narrow',Arial,sans-serif;font-weight:500;
  color:var(--ink-3);cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--accent);color:#fff;font-weight:700}
.big-btn{width:100%;padding:13px;border-radius:var(--radius);font-size:15px;
  font-weight:700;font-family:'Arial Narrow',Arial,sans-serif;
  border:none;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .15s;margin-bottom:8px}
.big-btn:active{transform:scale(.98)}
.big-btn.primary{background:var(--accent);color:#fff}
.big-btn.secondary{background:var(--paper-2);color:var(--ink)}
/* logo click cursor */
.hdr-logo-wrap{cursor:pointer}

</style>
</head>

<div class="toast" id="toast"></div>

<script>
"use strict";

// ── CONFIG ────────────────────────────────────────────
// Size steps: [rowHeight, fontSize]
const SIZE_STEPS = [
  [16, 8 ],
  [18, 9 ],
  [20, 9 ],
  [22, 10],
  [24, 10],  // default (index 4)
  [28, 11],
  [32, 11],
  [38, 12],
  [44, 12],
];
// px-per-day per mode + zoom level
const ZPRE = {
  day:   [4, 6, 9, 14, 20, 30],
  week:  [1, 2, 3,  5,  8, 12],
  month: [0.4, 0.7, 1.2, 2, 3.5, 5.5],
};
let sizeIdx = 4;
let mode = 'day';
let zIdx  = 3;   // default mid-zoom
const HDR_H = 96;

function getStep(){ return SIZE_STEPS[sizeIdx]; }
function rowH()  { return getStep()[0]; }
function rowFs() { return getStep()[1]; }
const MO    = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const PAL   = ['#A80000','#d35400','#c57b00','#5d8a27','#1e8449','#1a7a6e','#1a5a8c','#5b3a9e','#8e3090','#666'];

// ── STATE ─────────────────────────────────────────────
let T=[];
let cStart=null, cDays=0;
let selId=null, tipTmr=null;
let depStyle='curve'; // 'curve' | 'ortho'
let collapsed=new Set(); // ids of collapsed summary tasks
let showLegend=false;    // off by default

// Returns T entries that are currently visible (not inside a collapsed group)
function getVisible(){
  const hidden=new Set();
  // Walk T in order; if a summary is collapsed, hide all its descendants
  const stack=[]; // stack of {id, level}
  for(const t of T){
    // Pop stack items whose level >= current (we've left their subtree)
    while(stack.length && stack[stack.length-1].level >= t.level) stack.pop();
    // If any ancestor is collapsed → hide this task
    if(stack.some(s=>collapsed.has(s.id))){ hidden.add(t.id); }
    if(t.isSummary) stack.push({id:t.id, level:t.level});
  }
  return T.filter(t=>!hidden.has(t.id));
}

const ppd=()=>ZPRE[mode][zIdx];

// ── FILE ─────────────────────────────────────────────
document.getElementById('fileIn').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>load(ev.target.result,f.name);
  r.onerror=()=>showToast('Lesefehler');
  r.readAsText(f,'UTF-8');
  e.target.value='';
});

// ── CSV PARSE ─────────────────────────────────────────
function spl(line){
  const a=[]; let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if((ch===','||ch===';')&&!q){a.push(c.trim());c='';}
    else c+=ch;
  }
  a.push(c.trim()); return a;
}

// Parse DD.MM.YY or DD.MM.YYYY or YYYY-MM-DD
function pd(s){
  s=(s||'').trim().replace(/"/g,'');
  let m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=y<50?2000:1900;return new Date(y,+m[2]-1,+m[1]);}
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}

// Parse deps: "115", "117;118", "143-FS>P0D", "300-FS=P15D"
function parseDeps(s){
  if(!s)return[];
  return s.split(';').map(p=>p.trim().replace(/-[A-Z].*/i,'').trim())
          .filter(d=>d&&/^\d+$/.test(d));
}

// Outline level from GliederungsNr dots
function lvl(s){return s?(s.match(/\./g)||[]).length:0;}

// Is color usable (not black/very dark)?
function okColor(h){
  if(!h||h.length<4)return false;
  const hh=h.replace(/"/g,'').trim();
  if(hh.length<7)return false;
  const r=parseInt(hh.slice(1,3),16),g=parseInt(hh.slice(3,5),16),b=parseInt(hh.slice(5,7),16);
  return(r+g+b)>80;
}

// Text color on colored bar
function tc(hex){
  if(!hex)return'rgba(255,255,255,.9)';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>145?'rgba(0,0,0,.75)':'rgba(255,255,255,.92)';
}

// ── LOAD ─────────────────────────────────────────────
function load(text,filename){
  try{
    const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
    if(lines.length<2){showToast('CSV zu kurz.');return;}

    const hdr=spl(lines[0]);
    const norm=s=>s.toLowerCase().replace(/[^a-z0-9äöü]/g,'');
    const H=hdr.map(norm);
    const ci=(...ns)=>{for(const n of ns){const i=H.indexOf(norm(n));if(i>=0)return i;}return -1;};

    const I={
      id:   ci('ID','id','nr'),
      name: ci('Vorgang','Name','Vorgangsname','TaskName'),
      start:ci('Anfang','Start','Starttermin','Begin'),
      end:  ci('Ende','End','Endtermin','Finish'),
      dur:  ci('Dauer','Duration'),
      prog: ci('Fortschritt','Completion'),
      dep:  ci('Vorgänger','Predecessors','Dependencies'),
      gln:  ci('GliederungsNr','GliederungNr','OutlineNumber'),
      col:  ci('Vorgangsfarbe','TaskColor','Color'),
      note: ci('Notizen','Notes','Note'),
      res:  ci('Verantwortlich','Ressourcen','Resources'),
    };

    if(I.name<0){showToast('Spalte „Vorgang" nicht gefunden.');return;}

    const raw=[];
    for(let i=1;i<lines.length;i++){
      const r=spl(lines[i]);
      if(r.every(c=>!c))continue;
      const name=I.name>=0?r[I.name]:'';
      if(!name.trim())continue;

      const id    = I.id>=0?(r[I.id]||String(i)):String(i);
      const startS= I.start>=0?r[I.start]:'';
      const endS  = I.end  >=0?r[I.end]  :'';
      const durS  = I.dur  >=0?r[I.dur]  :'';
      const start = pd(startS);
      let   end   = pd(endS);
      const dur   = parseInt(durS)||0;
      if(start&&!end&&dur>0){end=new Date(start);end.setDate(end.getDate()+dur-1);}
      if(!start)continue;
      if(!end)end=new Date(start);

      const deps  = parseDeps(I.dep>=0?r[I.dep]:'');
      const prog  = parseFloat(I.prog>=0?r[I.prog]:'')||0;
      const level = lvl(I.gln>=0?r[I.gln]:'');
      const isMilestone = dur===0;
      const colorRaw = I.col>=0?r[I.col].replace(/"/g,'').trim():'';
      const color = okColor(colorRaw)?colorRaw:null;
      const note  = I.note>=0?r[I.note].trim():'';
      const res   = I.res >=0?r[I.res ].trim():'';

      raw.push({id,name:name.trim(),start,end,dur,deps,prog,level,isMilestone,isSummary:false,color,note,res});
    }

    // Mark summaries
    for(let i=0;i<raw.length-1;i++)
      if(raw[i+1].level>raw[i].level)raw[i].isSummary=true;

    // Inherit / assign colors by palette
    let palI=0, inherit=PAL[0];
    for(const t of raw){
      if(t.level===0){
        if(!t.color)t.color=PAL[palI%PAL.length];
        inherit=t.color; palI++;
      } else if(!t.color){
        t.color=inherit;
      }
    }

    T=raw;
    if(!T.length){showToast('Keine Vorgänge gefunden.');return;}

    // Update header
    const fname=filename.replace(/\.csv$/i,'');
    document.getElementById('htitle').textContent=fname;
    const dates=T.flatMap(t=>[t.start,t.end]).filter(Boolean);
    const mn=new Date(Math.min(...dates)), mx=new Date(Math.max(...dates));
    document.getElementById('hrange').style.display='';
    document.getElementById('hrange-val').textContent=
      mn.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})+
      ' – '+mx.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});

    document.getElementById('empty').style.display='none';
    document.getElementById('gwrap').classList.add('on');
    document.getElementById('zbar').classList.add('on');

    // Compute hdr height dynamically
    computeHdrH();
    build();
    buildLegend();
    applySize();
    setTimeout(positionHandle, 50);
  }catch(e){console.error(e);showToast('Fehler beim Einlesen.');}
}

// ── HDR HEIGHT ────────────────────────────────────────
function computeHdrH(){
  const hdr = document.querySelector('header');
  if(hdr){
    const h = hdr.offsetHeight;
    document.documentElement.style.setProperty('--hdr-h', h + 'px');
    // Also update zbar top position (= header height)
    const zbar = document.getElementById('zbar');
    if(zbar) zbar.style.top = h + 'px';
  }
}

// ── SLIDER (row height / font size only) ─────────────
function onSlider(val){
  sizeIdx = parseInt(val);
  applySize();
  build();
}

function applySize(){
  const [rh, fs] = getStep();
  document.documentElement.style.setProperty('--row-h', rh + 'px');
}

// ── MODE + ZOOM BUTTONS ───────────────────────────────
function setMode(m){
  mode = m;
  document.querySelectorAll('.zmodeBtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('zm-'+m).classList.add('on');
  build();
}

function adjZ(d){
  const L = ZPRE[mode];
  zIdx = Math.max(0, Math.min(L.length-1, zIdx+d));
  build();
}

// ── X POSITION ───────────────────────────────────────
function x2(d){return Math.round((d-cStart)/86400000*ppd());}

// ── BUILD ─────────────────────────────────────────────
function build(){
  if(!T.length)return;
  applySize();
  // Date range
  const dates=T.flatMap(t=>[t.start,t.end]).filter(Boolean);
  let mn=new Date(Math.min(...dates)), mx=new Date(Math.max(...dates));
  mn.setDate(mn.getDate()-7); mx.setDate(mx.getDate()+21);
  const wd=mn.getDay(); mn.setDate(mn.getDate()-(wd===0?6:wd-1));
  cStart=mn; cDays=Math.ceil((mx-mn)/86400000)+1;

  const V=getVisible();
  const P=ppd(), W=cDays*P, H=V.length*rowH();

  // ── Left panel rows ──
  const lpRows=document.getElementById('lp-rows');
  lpRows.innerHTML='';
  V.forEach(t=>{
    const div=document.createElement('div');
    const isCollapsed=collapsed.has(t.id);
    div.className=`tr l${Math.min(t.level,5)}${t.isMilestone?' ms':''}`;
    div.dataset.id=t.id;
    const indent=t.level*12;
    div.style.fontSize = rowFs() + 'px';
    div.innerHTML=
      `<div style="width:${indent+4}px;flex-shrink:0"></div>`+
      `<div class="tr-arr">${t.isSummary?(isCollapsed?'▸':'▾'):t.isMilestone?'◆':''}</div>`+
      `<div class="tr-n" title="${esc(t.name)}">${esc(t.name)}</div>`;
    if(t.isSummary){
      // Click on arrow toggles collapse; click elsewhere picks
      div.addEventListener('click', e=>{
        const arr=div.querySelector('.tr-arr');
        if(e.target===arr||e.target.closest('.tr-arr')){
          if(collapsed.has(t.id)) collapsed.delete(t.id);
          else collapsed.add(t.id);
          build();
        } else {
          pick(t.id);
        }
      });
    } else {
      div.addEventListener('click',()=>pick(t.id));
    }
    lpRows.appendChild(div);
  });

  // ── Timeline header ──
  const tli=document.getElementById('tli');
  tli.style.width=W+'px'; tli.innerHTML=buildTL(P);

  // ── Chart inner ──
  const cin=document.getElementById('cin');
  cin.style.width=W+'px'; cin.style.height=H+'px';

  let h='';
  const tod=new Date(); tod.setHours(0,0,0,0);

  // Grid + weekends
  for(let d=0;d<cDays;d++){
    const cur=new Date(cStart); cur.setDate(cur.getDate()+d);
    const px=d*P, dow=cur.getDay();
    if((dow===0||dow===6)&&P>=4)
      h+=`<div class="wknd" style="left:${px}px;width:${Math.max(P,1)}px"></div>`;
    if(cur.getDate()===1)
      h+=`<div class="gl maj" style="left:${px}px"></div>`;
    else if(dow===1&&P>=3)
      h+=`<div class="gl min" style="left:${px}px"></div>`;
  }

  // Today line
  const tx=x2(tod);
  if(tx>=0&&tx<=W)
    h+=`<div id="today-line" style="left:${tx}px"></div>`;

  // Row backgrounds
  V.forEach((_,i)=>{
    h+=`<div class="gr${i%2?' alt':''}" style="top:${i*rowH()}px;width:${W}px"></div>`;
  });

  // Bars & milestones
  V.forEach((t,i)=>{
    const bx=x2(t.start), bx2=x2(t.end)+P, bw=Math.max(bx2-bx,3);
    const bg=t.color||'#A80000', fc=tc(bg);
    if(t.isMilestone){
      const mx=x2(t.start)+P/2-5, my=i*rowH()+rowH()/2-5;
      h+=`<div class="msd" data-id="${t.id}" style="left:${mx}px;top:${my}px;background:${bg}"></div>`;
    } else {
      const lbl=bw>40?esc(t.name):'';
      const pw=t.prog>0?bw*t.prog/100:0;
      h+=`<div class="bar${t.isSummary?' sm':''}" data-id="${t.id}"
        style="left:${bx}px;width:${bw}px;top:${i*rowH()}px;background:${bg}">
        ${pw?`<div class="bprog" style="width:${pw}px"></div>`:''}
        <span class="blbl" style="color:${fc}">${lbl}</span>
      </div>`;
    }
  });

  // SVG for deps
  h+=`<svg id="dsvg" style="width:${W}px;height:${H}px"><defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0,6 2,0 4" fill="rgba(168,0,0,.5)"/>
    </marker>
    <marker id="arr-hi" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0,6 2,0 4" fill="#A80000"/>
    </marker>
  </defs></svg>`;

  cin.innerHTML=h;
  drawDeps(P);
  wire();

  // Scroll sync
  const chart=document.getElementById('chart');
  const lp=document.getElementById('lp');
  const tliEl=document.getElementById('tli');
  // Sync scroll (use named handler via data attribute trick to avoid duplicates)
  chart._syncScroll = ()=>{
    lp.scrollTop = chart.scrollTop;
    tliEl.style.transform = `translateX(-${chart.scrollLeft}px)`;
  };
  chart.removeEventListener('scroll', chart._oldSync);
  chart.addEventListener('scroll', chart._syncScroll, {passive:true});
  chart._oldSync = chart._syncScroll;
  chart.appendChild(cin);

  // Scroll to today
  const stx=Math.max(0,tx-(document.getElementById('chart').clientWidth||window.innerWidth)*0.25);
  document.getElementById('chart').scrollLeft=stx;

  // Reattach dep/wire after chart rebuild
  drawDeps(P);
  wire();
}

// ── TIMELINE ─────────────────────────────────────────
function buildTL(P){
  let h=''; let lastMo=-1,lastYr=-1;
  for(let d=0;d<cDays;d++){
    const cur=new Date(cStart); cur.setDate(cur.getDate()+d);
    const px=d*P, mo=cur.getMonth(), yr=cur.getFullYear();
    const dow=cur.getDay(), isMon=dow===1, is1=cur.getDate()===1;

    if(mo!==lastMo||yr!==lastYr){
      // Month border
      if(d>0) h+=`<div class="tl mo-border" style="left:${px}px"></div>`;
      h+=`<div class="tl mo" style="left:${px+4}px">${MO[mo]} ${yr}</div>`;
      lastMo=mo; lastYr=yr;
    }

    if(mode==='day'){
      if(P>=18&&dow!==0&&dow!==6)
        h+=`<div class="tl sub" style="left:${px+2}px">${cur.getDate()}</div>`;
      else if(P>=8&&isMon)
        h+=`<div class="tl sub" style="left:${px+2}px">KW${kw(cur)}</div>`;
    } else if(mode==='week'&&isMon){
      h+=`<div class="tl sub" style="left:${px+2}px">KW${kw(cur)}</div>`;
    } else if(mode==='month'&&is1){
      h+=`<div class="tl sub" style="left:${px+2}px">${MO[mo]}</div>`;
    }
  }
  return h;
}

function kw(d){
  const j4=new Date(d.getFullYear(),0,4);
  const sw=new Date(j4); sw.setDate(j4.getDate()-(j4.getDay()||7)+1);
  return Math.floor((d-sw)/604800000)+1;
}

// ── DEPENDENCIES ─────────────────────────────────────
function depPath(x1,y1,x2v,y2,P){
  if(depStyle==='ortho'){
    // Orthogonal: right from end → mid-gap → down/up → left to start
    const gap=8; // px gap before hooking
    const mx=(x1+x2v)/2;
    if(x2v>x1+gap*2){
      // Enough space: straight elbow
      return `M${x1},${y1} H${mx} V${y2} H${x2v}`;
    } else {
      // Tight: go right a bit, hook around below/above
      const dir=y2>y1?1:-1;
      const hy=Math.max(y1,y2)+dir*rowH()*0.6;
      return `M${x1},${y1} H${x1+gap} V${hy} H${x2v-gap} V${y2} H${x2v}`;
    }
  } else {
    // Organic cubic bezier
    const dx=Math.abs(x2v-x1), cp=Math.max(dx*.4,18);
    return `M${x1},${y1} C${x1+cp},${y1} ${x2v-cp},${y2} ${x2v},${y2}`;
  }
}

function drawDeps(P){
  const svg=document.getElementById('dsvg'); if(!svg)return;
  const V=getVisible();
  const im={}; V.forEach((t,i)=>im[t.id]=i);
  const visIds=new Set(V.map(t=>t.id));
  let paths='';
  V.forEach(t=>t.deps.forEach(did=>{
    const src=T.find(x=>x.id===did); if(!src||!visIds.has(src.id))return;
    const si=im[src.id], ti=im[t.id];
    if(si==null||ti==null)return;
    const x1=x2(src.end)+P, y1=si*rowH()+rowH()/2;
    const x2v=x2(t.start),  y2=ti*rowH()+rowH()/2;
    const d=depPath(x1,y1,x2v,y2,P);
    const col=src.color||'#A80000';
    paths+=`<path class="dep" data-from="${src.id}" data-to="${t.id}" stroke="${col}" d="${d}" marker-end="url(#arr)"/>`;
  }));
  svg.innerHTML=svg.querySelector('defs').outerHTML+paths;
}

// ── EVENTS ────────────────────────────────────────────
function wire(){
  const cin=document.getElementById('cin');
  cin.addEventListener('click',e=>{
    const el=e.target.closest('[data-id]');
    if(el){pick(el.dataset.id);showTip(el.dataset.id,e);}
    else{unpick();hideTip();}
  });
  cin.addEventListener('touchstart',e=>{
    const el=e.target.closest('[data-id]');
    if(el){pick(el.dataset.id);showTip(el.dataset.id,e.touches[0]);}
    else{unpick();hideTip();}
  },{passive:true});
}

function pick(id){
  selId=id;
  // Highlight task row
  document.querySelectorAll('.tr').forEach(r=>r.classList.toggle('sel',r.dataset.id===id));
  const t=T.find(x=>x.id===id);
  const dset=new Set(t?t.deps:[]);
  // Highlight deps
  document.querySelectorAll('.dep').forEach(p=>{
    const hi=p.dataset.from===id||p.dataset.to===id||dset.has(p.dataset.from);
    p.classList.toggle('hi',hi);
    p.setAttribute('marker-end',hi?'url(#arr-hi)':'url(#arr)');
    const src=T.find(x=>x.id===p.dataset.from);
    p.setAttribute('stroke',hi?'#A80000':src?src.color||'#A80000':'#A80000');
    if(!hi){const sc=T.find(x=>x.id===p.dataset.from);p.setAttribute('stroke',sc?sc.color||'#A80000':'#A80000');}
  });
  // Scroll task row into view in left panel
  const row=document.querySelector(`.tr[data-id="${id}"]`);
  if(row)row.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function unpick(){
  selId=null;
  document.querySelectorAll('.tr').forEach(r=>r.classList.remove('sel'));
  document.querySelectorAll('.dep').forEach(p=>{
    p.classList.remove('hi');
    p.setAttribute('marker-end','url(#arr)');
    const src=T.find(x=>x.id===p.dataset.from);
    p.setAttribute('stroke',src?src.color||'#A80000':'#A80000');
  });
}

// ── TOOLTIP ──────────────────────────────────────────
function df(d){return d?d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}):'–';}

function showTip(id,e){
  const t=T.find(x=>x.id===id); if(!t)return;
  const dur=Math.round((t.end-t.start)/86400000)+1;
  const dns=t.deps.map(d=>{const f=T.find(x=>x.id===d);return f?f.name:d;});
  const tip=document.getElementById('tip');
  const col=t.color||'#A80000';

  tip.innerHTML=
    `<div class="tn" style="border-left:3px solid ${col};padding-left:7px">${esc(t.name)}</div>`+
    `<div class="tr2"><span class="tk">Anfang</span><span class="tv">${df(t.start)}</span></div>`+
    `<div class="tr2"><span class="tk">Ende</span><span class="tv">${df(t.end)}</span></div>`+
    `<div class="tr2"><span class="tk">Dauer</span><span class="tv">${dur} ${dur===1?'Tag':'Tage'}</span></div>`+
    (t.prog?`<div class="tprog-wrap"><div class="tprog-fill" style="width:${t.prog}%;background:${col}"></div></div>
      <div class="tr2"><span class="tk">Fortschritt</span><span class="tv">${t.prog}%</span></div>`:'') +
    (t.res?`<div class="tr2"><span class="tk">Verantw.</span><span class="tv">${esc(t.res)}</span></div>`:'')+
    (dns.length?`<div class="tsec"><div class="tsh">Vorgänger</div><div class="tdep">${dns.map(n=>'↳ '+esc(n)).join('<br>')}</div></div>`:'')+
    (t.note?`<div class="tsec"><div class="tsh">Notiz</div><div class="tnote">${esc(t.note)}</div></div>`:'');

  const vw=window.innerWidth, vh=window.innerHeight;
  const cx=e.clientX||0, cy=e.clientY||0;
  tip.style.opacity='0'; tip.style.display='block';
  const tw=tip.offsetWidth, th=tip.offsetHeight;
  let tx=cx+14, ty=cy-8;
  if(tx+tw>vw-8)tx=cx-tw-14;
  if(ty+th>vh-8)ty=vh-th-8;
  if(ty<60)ty=60;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
  tip.classList.add('on');
  clearTimeout(tipTmr);
  tipTmr=setTimeout(hideTip,5000);
}
function hideTip(){document.getElementById('tip').classList.remove('on');}

// ── LEGEND ───────────────────────────────────────────
function buildLegend(){
  const leg=document.getElementById('leg');
  // Find unique top-level groups
  const groups=[];
  T.forEach(t=>{
    if(t.level===0&&t.color){
      groups.push({name:t.name,color:t.color});
    }
  });
  if(!groups.length||!showLegend){leg.classList.remove('on');return;}
  leg.classList.add('on');
  leg.innerHTML=`<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);margin-bottom:2px;font-family:'Arial Narrow',Arial,sans-serif">Legende</div>`+
    groups.slice(0,8).map(g=>
      `<div class="leg-item"><div class="leg-dot" style="background:${g.color}"></div><span>${esc(g.name)}</span></div>`
    ).join('')+
    `<div class="leg-item" style="margin-top:3px">
      <svg width="20" height="8" style="flex-shrink:0">
        <defs><marker id="la" markerWidth="5" markerHeight="4" refX="4.5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="rgba(168,0,0,.6)"/></marker></defs>
        <path d="M0,4 L16,4" stroke="rgba(168,0,0,.6)" stroke-width="1.2" marker-end="url(#la)" fill="none"/>
      </svg>
      <span>Abhängigkeit</span>
    </div>`;
}


function setLegend(v){
  showLegend = v;
  const s=getSavedSettings(); s.legend=v;
  localStorage.setItem('gantt_settings',JSON.stringify(s));
  ['leg-off','leg-on'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.toggle('on', id===(v?'leg-on':'leg-off'));
  });
  buildLegend();
}

// ── SETTINGS ─────────────────────────────────────────
let darkMode = 'auto';

function openSettings(){
  loadSettingsUI();
  document.getElementById('modalSettings').classList.remove('hidden');
}
function closeSettings(){
  document.getElementById('modalSettings').classList.add('hidden');
}
// modalSettings listener attached in init() below

function loadSettingsUI(){
  const s = getSavedSettings();
  document.getElementById('sBuero').value = s.buero||'';
  document.getElementById('sName').value  = s.name||'';
  // dark mode buttons
  ['auto','light','dark'].forEach(v=>{
    document.getElementById('dm-'+v).classList.toggle('on', (s.dark||'auto')===v);
  });
  // dep style buttons
  ['curve','ortho'].forEach(v=>{
    document.getElementById('dep-'+v).classList.toggle('on', (s.depStyle||'curve')===v);
  });
  // legend toggle (default off)
  const legOn = s.legend===true;
  ['leg-off','leg-on'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.toggle('on', id===(legOn?'leg-on':'leg-off'));
  });
}

function getSavedSettings(){
  try{ return JSON.parse(localStorage.getItem('gantt_settings')||'{}'); }catch(e){ return {}; }
}

function saveSettings(){
  const s = getSavedSettings();
  s.buero = document.getElementById('sBuero').value;
  s.name  = document.getElementById('sName').value;
  localStorage.setItem('gantt_settings', JSON.stringify(s));
}

function setDark(v){
  darkMode = v;
  const s = getSavedSettings(); s.dark = v;
  localStorage.setItem('gantt_settings', JSON.stringify(s));
  applyDark(v);
  ['auto','light','dark'].forEach(id=>{
    document.getElementById('dm-'+id).classList.toggle('on', id===v);
  });
}

function applyDark(v){
  const root = document.documentElement;
  if(v==='dark') root.setAttribute('data-theme','dark');
  else if(v==='light') root.removeAttribute('data-theme');
  else{
    window.matchMedia('(prefers-color-scheme: dark)').matches
      ? root.setAttribute('data-theme','dark')
      : root.removeAttribute('data-theme');
  }
}

function setDepStyle(v){
  depStyle = v;
  const s = getSavedSettings(); s.depStyle = v;
  localStorage.setItem('gantt_settings', JSON.stringify(s));
  ['curve','ortho'].forEach(id=>{
    document.getElementById('dep-'+id).classList.toggle('on', id===v);
  });
  if(T.length) drawDeps(ppd());
}

function initSettings(){
  const s = getSavedSettings();
  darkMode = s.dark || 'auto';
  applyDark(darkMode);
  if(s.depStyle) depStyle = s.depStyle;
  showLegend = s.legend===true;
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
  if(darkMode==='auto') applyDark('auto');
});

// ── SVG EXPORT ───────────────────────────────────────
async function exportPDF(){
  if(!T.length){ showToast('Keine Daten zum Exportieren'); return; }

  const s       = getSavedSettings();
  const buero   = s.buero || 'desch architekten';
  const name    = s.name  || '';
  const accent  = '#A80000';
  const MO2     = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const projTitle = document.getElementById('htitle').textContent || 'Bauzeitenplan';

  // ── Layout ──────────────────────────────────────────
  const ROW = 20, LEFT = 240, TL = 32, PPD = 4;
  // Header strip height in SVG
  const HDR = 36;

  const dates = T.flatMap(t=>[t.start,t.end]).filter(Boolean);
  let cs = new Date(Math.min(...dates)), ce = new Date(Math.max(...dates));
  cs.setDate(cs.getDate()-4); ce.setDate(ce.getDate()+12);
  const wd=cs.getDay(); cs.setDate(cs.getDate()-(wd===0?6:wd-1));
  const totalDays = Math.ceil((ce-cs)/86400000)+1;
  const CW = totalDays*PPD;
  const CH = T.length*ROW;
  // Total SVG dimensions: HDR strip on top, then TL timeline, then rows
  const W  = LEFT+CW;
  const H  = HDR+TL+CH;

  function gx(d){ return LEFT + Math.round((d-cs)/86400000*PPD); }
  function xe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  const p = [];  // SVG parts

  // ── Open SVG ──
  p.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">`);

  // ── Defs ──
  p.push(`<defs>
  <marker id="a" markerWidth="6" markerHeight="4" refX="5.5" refY="2" orient="auto">
    <polygon points="0 0,6 2,0 4" fill="${accent}" opacity="0.5"/>
  </marker>
  <clipPath id="cc"><rect x="${LEFT}" y="${HDR}" width="${CW}" height="${TL+CH}"/></clipPath>
  <clipPath id="nc"><rect x="0" y="${HDR+TL}" width="${LEFT-3}" height="${CH}"/></clipPath>
  <clipPath id="tc"><rect x="${LEFT}" y="${HDR}" width="${CW}" height="${TL}"/></clipPath>
</defs>`);

  // ── Header strip ──
  p.push(`<rect width="${W}" height="${HDR}" fill="${accent}"/>`);
  // Büro name left
  p.push(`<text x="10" y="${HDR*0.68}" font-family="Arial Narrow,Arial,sans-serif" font-size="16" font-weight="900" fill="white" letter-spacing="-0.3">${xe(buero)}</text>`);
  // Project title + range right
  const fmt = d=>d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
  const mn=new Date(Math.min(...dates)), mx=new Date(Math.max(...dates));
  const rangeStr = fmt(mn)+' – '+fmt(mx);
  p.push(`<text x="${W-10}" y="${HDR*0.52}" font-family="Arial Narrow,Arial,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="end">${xe(projTitle)}</text>`);
  p.push(`<text x="${W-10}" y="${HDR*0.88}" font-family="Arial Narrow,Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.8)" text-anchor="end">${xe(rangeStr)}</text>`);

  // ── Main background ──
  p.push(`<rect y="${HDR}" width="${W}" height="${TL+CH}" fill="#f5f2ed"/>`);
  // Timeline header bg
  p.push(`<rect y="${HDR}" width="${W}" height="${TL}" fill="#ece8e0"/>`);
  // Left panel bg
  p.push(`<rect y="${HDR}" width="${LEFT}" height="${TL+CH}" fill="rgba(245,242,237,0.95)"/>`);

  // ── Grid (clipped to chart area) ──
  let grid = `<g clip-path="url(#cc)">`;
  let prevMo = -1;
  for(let d=0;d<totalDays;d++){
    const cur=new Date(cs); cur.setDate(cur.getDate()+d);
    const x=LEFT+d*PPD, dow=cur.getDay();
    const is1=cur.getDate()===1, isMon=dow===1;
    if(dow===0||dow===6) grid+=`<rect x="${x}" y="${HDR+TL}" width="${PPD}" height="${CH}" fill="rgba(100,0,0,0.03)"/>`;
    if(is1){
      grid+=`<line x1="${x}" y1="${HDR}" x2="${x}" y2="${H}" stroke="#bbb6ac" stroke-width="0.7"/>`;
      const mo=cur.getMonth(),yr=cur.getFullYear();
      if(mo!==prevMo){
        grid+=`<text clip-path="url(#tc)" x="${x+3}" y="${HDR+TL-8}" font-family="Arial Narrow,Arial,sans-serif" font-size="9" font-weight="700" fill="#666">${MO2[mo]} ${yr}</text>`;
        prevMo=mo;
      }
    } else if(isMon){
      grid+=`<line x1="${x}" y1="${HDR+TL}" x2="${x}" y2="${H}" stroke="#ddd8ce" stroke-width="0.4"/>`;
    }
  }
  // Today
  const tod=new Date(); tod.setHours(0,0,0,0);
  const tx=gx(tod);
  if(tx>=LEFT&&tx<=W){
    grid+=`<line x1="${tx}" y1="${HDR}" x2="${tx}" y2="${H}" stroke="${accent}" stroke-width="1.5" opacity="0.5"/>`;
    grid+=`<text x="${tx+3}" y="${HDR+TL-8}" font-family="Arial Narrow,Arial,sans-serif" font-size="8" font-weight="700" fill="${accent}">heute</text>`;
  }
  grid+=`</g>`;
  p.push(grid);

  // ── Row stripes ──
  let rows='';
  T.forEach((_,i)=>{
    const ry=HDR+TL+i*ROW;
    if(i%2===0) rows+=`<rect y="${ry}" width="${W}" height="${ROW}" fill="rgba(232,228,218,0.4)"/>`;
    rows+=`<line x1="0" y1="${ry+ROW}" x2="${W}" y2="${ry+ROW}" stroke="#ddd8ce" stroke-width="0.35"/>`;
  });
  p.push(rows);

  // ── Timeline header label ──
  p.push(`<text x="8" y="${HDR+TL-9}" font-family="Arial Narrow,Arial,sans-serif" font-size="8" font-weight="700" fill="#999" letter-spacing="0.5">VORGANG</text>`);
  p.push(`<line x1="0" y1="${HDR+TL}" x2="${W}" y2="${HDR+TL}" stroke="#c8c4b8" stroke-width="0.8"/>`);

  // ── Task names ──
  let nms=`<g clip-path="url(#nc)">`;
  T.forEach((t,i)=>{
    const ry=HDR+TL+i*ROW;
    const ind=6+t.level*11;
    const fs=t.level===0?9.5:t.level===1?8.5:8;
    const fw=t.level<=1?'bold':'normal';
    const fc=t.level===0?'#1a1a1a':t.level<=2?'#444':'#666';
    const maxC=Math.floor((LEFT-ind-10)/(fs*0.52));
    const lbl=t.name.length>maxC?t.name.slice(0,maxC-1)+'…':t.name;
    nms+=`<text x="${ind}" y="${ry+ROW*0.65}" font-family="Arial Narrow,Arial,sans-serif" font-size="${fs}" font-weight="${fw}" fill="${fc}">${xe(lbl)}</text>`;
  });
  nms+=`</g>`;
  p.push(nms);

  // ── Bars & milestones ──
  let bars=`<g clip-path="url(#cc)">`;
  T.forEach((t,i)=>{
    const ry=HDR+TL+i*ROW;
    const bx=gx(t.start), bx2=gx(t.end)+PPD, bw=Math.max(bx2-bx,2);
    const bg=t.color||accent;
    if(t.isMilestone){
      const mx2=gx(t.start)+PPD/2, my2=ry+ROW/2, r2=Math.min(ROW*0.38,6);
      bars+=`<polygon points="${mx2},${my2-r2} ${mx2+r2},${my2} ${mx2},${my2+r2} ${mx2-r2},${my2}" fill="${bg}"/>`;
    } else {
      const bh=t.isSummary?ROW-6:ROW-9, by=ry+(ROW-bh)/2, rx2=t.isSummary?1.5:3;
      bars+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="${rx2}" fill="${bg}"/>`;
      if(t.prog>0) bars+=`<rect x="${bx}" y="${by}" width="${Math.max(bw*t.prog/100,0)}" height="${bh}" rx="${rx2}" fill="rgba(0,0,0,0.22)"/>`;
      if(bw>28){
        const lfs=7.5, maxC2=Math.floor((bw-6)/(lfs*0.55));
        const lbl=t.name.length>maxC2?t.name.slice(0,maxC2-1)+'…':t.name;
        const r2=parseInt(bg.slice(1,3),16),g2=parseInt(bg.slice(3,5),16),b2=parseInt(bg.slice(5,7),16);
        const lc=0.299*r2+0.587*g2+0.114*b2>145?'rgba(0,0,0,0.7)':'rgba(255,255,255,0.9)';
        bars+=`<text x="${bx+4}" y="${by+bh*0.73}" font-family="Arial Narrow,Arial,sans-serif" font-size="${lfs}" font-weight="700" fill="${lc}">${xe(lbl)}</text>`;
      }
    }
  });
  bars+=`</g>`;
  p.push(bars);

  // ── Dependencies ──
  const im={}; T.forEach((t,k)=>im[t.id]=k);
  let deps=`<g clip-path="url(#cc)" fill="none" stroke-width="1">`;
  T.forEach(t=>t.deps.forEach(did=>{
    const src=T.find(x=>x.id===did); if(!src)return;
    const si=im[src.id],ti=im[t.id];
    if(si==null||ti==null)return;
    const ax1=gx(src.end)+PPD, ay1=HDR+TL+si*ROW+ROW/2;
    const ax2=gx(t.start),     ay2=HDR+TL+ti*ROW+ROW/2;
    const col=src.color||accent;
    let dp;
    if(depStyle==='ortho'){
      const gap=6,mid=(ax1+ax2)/2;
      if(ax2>ax1+gap*2){ dp=`M${ax1},${ay1} H${mid} V${ay2} H${ax2}`; }
      else{ const dir=ay2>=ay1?1:-1,hy=Math.max(ay1,ay2)+dir*ROW*0.7; dp=`M${ax1},${ay1} H${ax1+gap} V${hy} H${ax2-gap} V${ay2} H${ax2}`; }
    } else {
      const cp=Math.max(Math.abs(ax2-ax1)*.42,14);
      dp=`M${ax1},${ay1} C${ax1+cp},${ay1} ${ax2-cp},${ay2} ${ax2},${ay2}`;
    }
    deps+=`<path d="${dp}" stroke="${col}" opacity="0.45" marker-end="url(#a)"/>`;
  }));
  deps+=`</g>`;
  p.push(deps);

  // ── Separator line ──
  p.push(`<line x1="${LEFT}" y1="${HDR}" x2="${LEFT}" y2="${H}" stroke="#a8a49c" stroke-width="1"/>`);

  // ── Footer strip ──
  const nowStr=new Date().toLocaleString('de-DE');
  p.push(`<rect y="${H-14}" width="${W}" height="14" fill="rgba(236,232,224,0.8)"/>`);
  p.push(`<text x="8" y="${H-4}" font-family="Arial Narrow,Arial,sans-serif" font-size="7" fill="#999">${xe(buero)}${name?' · '+xe(name):''}</text>`);
  p.push(`<text x="${W-8}" y="${H-4}" font-family="Arial Narrow,Arial,sans-serif" font-size="7" fill="#999" text-anchor="end">Exportiert ${xe(nowStr)}</text>`);

  p.push(`</svg>`);
  const svgTxt = p.join('\n');

  // ── Download SVG ──────────────────────────────────
  const fname = projTitle.replace(/[^\wäöüÄÖÜ\s-]/g,'_').trim()+'_Bauzeitenplan.svg';
  const blob  = new Blob([svgTxt],{type:'image/svg+xml;charset=utf-8'});
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  if(isIOS && navigator.share){
    // iOS Share Sheet (best option on iOS 15+)
    try{
      const file = new File([blob], fname, {type:'image/svg+xml'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:fname});
        closeSettings(); return;
      }
    }catch(e){ if(e.name==='AbortError'){closeSettings();return;} }
  }
  // Fallback: direct download
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
  showToast('SVG gespeichert – in Browser oder Illustrator öffnen');
  closeSettings();
}

// ── FULLSCREEN ───────────────────────────────────────
function toggleFullscreen(){
  const on = document.body.classList.toggle('fs');
  const btn = document.getElementById('btn-fs');
  btn.textContent = on ? '⊠' : '⛶';
  btn.title = on ? 'Vollbild beenden' : 'Vollbild';
  btn.style.color = on ? 'var(--accent)' : '';
  computeHdrH();
  setTimeout(positionHandle, 50);
}

// ── TOAST ─────────────────────────────────────────────
let _tTmr=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  if(_tTmr)clearTimeout(_tTmr);
  _tTmr=setTimeout(()=>t.classList.remove('show'),3000);
}

// ── ESC HTML ─────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── GLOBAL DISMISS ───────────────────────────────────
document.addEventListener('touchstart',e=>{
  if(!e.target.closest('[data-id]')&&!e.target.closest('#tip'))hideTip();
},{passive:true});

// ── RESIZE ───────────────────────────────────────────
window.addEventListener('resize',()=>{
  computeHdrH();
  if(T.length)build();
});

// ── DIVIDER RESIZE ───────────────────────────────────
const MIN_LEFT = 60;
const MAX_LEFT = () => Math.floor(window.innerWidth * 0.72);

let divDragging = false;
let divStartX   = 0;
let divStartW   = 220;

const divHandle = document.getElementById('div-handle');

function setLeftW(w){
  w = Math.max(MIN_LEFT, Math.min(MAX_LEFT(), Math.round(w)));
  document.documentElement.style.setProperty('--left-w', w + 'px');
  positionHandle();
}

function getCurrentLeftW(){
  const v = getComputedStyle(document.documentElement).getPropertyValue('--left-w');
  return parseFloat(v) || 220;
}

// Update handle horizontal position only (vertical is fixed via CSS)
function positionHandle(){
  if(!divHandle) return;
  divHandle.style.left = (getCurrentLeftW() - 16) + 'px';
}

// ── Mouse ──
divHandle.addEventListener('mousedown', e => {
  e.preventDefault();
  divDragging = true;
  divStartX   = e.clientX;
  divStartW   = getCurrentLeftW();
  divHandle.classList.add('dragging');
  document.body.classList.add('col-resizing');
});

document.addEventListener('mousemove', e => {
  if(!divDragging) return;
  setLeftW(divStartW + (e.clientX - divStartX));
});

document.addEventListener('mouseup', () => {
  if(!divDragging) return;
  divDragging = false;
  divHandle.classList.remove('dragging');
  document.body.classList.remove('col-resizing');
});

// ── Touch ──
divHandle.addEventListener('touchstart', e => {
  if(e.touches.length !== 1) return;
  e.preventDefault();
  divDragging = true;
  divStartX   = e.touches[0].clientX;
  divStartW   = getCurrentLeftW();
  divHandle.classList.add('dragging');
}, { passive: false });

document.addEventListener('touchmove', e => {
  if(!divDragging) return;
  e.preventDefault();
  setLeftW(divStartW + (e.touches[0].clientX - divStartX));
}, { passive: false });

document.addEventListener('touchend', () => {
  if(!divDragging) return;
  divDragging = false;
  divHandle.classList.remove('dragging');
});

// ── Scroll: reposition handle vertically ──
// Listeners attached in init() below
window.addEventListener('resize', () => { positionHandle(); computeHdrH(); });
// ── INIT (wire DOM after full parse) ─────────────────
document.addEventListener('DOMContentLoaded', function(){
  const ms = document.getElementById('modalSettings');
  if(ms) ms.addEventListener('click', e=>{
    if(e.target===ms) closeSettings();
  });
  const chart = document.getElementById('chart');
  if(chart) chart.addEventListener('scroll', positionHandle, {passive:true});
  initSettings();
});
</script>
