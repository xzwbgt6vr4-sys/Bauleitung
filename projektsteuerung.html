<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="desch PS">
<title>Projektsteuerung - desch architekten</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1a1a; --ink-2:#444; --ink-3:#888;
    --paper:#f5f2ed; --paper-2:#ece8e0; --paper-3:#e0dbd0;
    --accent:#A80000; --accent-2:#d43333;
    --green:#2a7a4e; --blue:#1e5a8c; --amber:#b87000;
    --card:#faf8f4;
    --shadow:0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
    --radius:14px; --radius-sm:8px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Arial Narrow',Arial,sans-serif;background:#e8e4de;color:var(--ink);min-height:100vh;overflow-x:hidden;}

  /* -- STICKY TOP -- */
  .sticky-top{position:sticky;top:0;z-index:100;}
  header{background:#fff;color:var(--ink);padding:calc(var(--safe-top) + 14px) 20px 0;display:flex;align-items:center;justify-content:space-between;}
  .header-logo-wrap{flex:1;}
  .header-logo-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .pro-badge{font-family:'Permanent Marker','Segoe Script',cursive;font-size:22px;font-weight:900;color:#00A8A8;line-height:1;transform:rotate(-20deg);display:inline-block;margin-left:4px;margin-top:4px;letter-spacing:-0.5px;position:relative;z-index:1;}
  .header-logo{width:260px;height:32px;flex-shrink:0;}
  .header-logo svg{display:block;width:100%;height:100%;}
  .header-sub{font-size:13px;color:var(--ink-3);display:flex;align-items:center;margin-top:2px;padding-left:10px;}
  .header-sub span:first-child{color:var(--ink-2);font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
  .header-sub span:last-child{color:var(--ink-3);font-weight:600;}
  .header-btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:'Arial Narrow',Arial,sans-serif;cursor:pointer;white-space:nowrap;}

  /* -- TABS -- */
  .tabs{display:flex;background:#fff;padding:0 14px 0;gap:2px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border-bottom:1px solid #ddd8d0;box-shadow:0 2px 8px rgba(0,0,0,0.07);white-space:nowrap;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:10px 14px 11px;font-size:12px;font-weight:500;color:var(--ink-3);border:none;background:transparent;cursor:pointer;font-family:'Arial Narrow',Arial,sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

  /* -- MAIN -- */
  main{padding:16px 16px calc(var(--safe-bottom) + 80px);max-width:760px;margin:0 auto;}

  /* -- SCREENS -- */
  .screen{display:none;animation:fadeUp 0.2s ease;}
  .screen.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* -- KPI STRIP -- */
  .kpi-strip{display:flex;gap:0;overflow-x:auto;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--paper-3);}
  .kpi-strip::-webkit-scrollbar{display:none;}
  .kpi-item{padding:12px 16px;border-right:1px solid var(--paper-3);min-width:120px;flex-shrink:0;}
  .kpi-item:last-child{border-right:none;}
  .kpi-label{font-size:9px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:3px;}
  .kpi-value{font-size:18px;font-weight:700;letter-spacing:-0.3px;color:var(--ink);line-height:1;}
  .kpi-delta{font-size:10px;margin-top:2px;color:var(--ink-3);}
  .kpi-delta.pos{color:var(--green);} .kpi-delta.neg{color:var(--accent);}

  /* -- CARDS -- */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--paper-3);display:flex;align-items:center;justify-content:space-between;background:var(--paper-2);}
  .card-title{font-family:'Arial Narrow',Arial,sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-2);}
  .card-body{padding:0;}

  /* -- SEC LABEL -- */
  .sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-3);margin:16px 0 8px;}
  .sec-label:first-child{margin-top:0;}

  /* -- TABLE -- */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead{background:var(--paper-3);}
  thead th{padding:7px 11px;text-align:left;font-size:9px;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-3);font-weight:700;border-bottom:1px solid var(--paper-3);white-space:nowrap;}
  thead th.r{text-align:right;}
  tbody tr{border-bottom:1px solid rgba(0,0,0,0.05);}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--paper-2);}
  tbody tr.grp-row{background:var(--paper-3);}
  tbody tr.grp-row td{font-size:9px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:var(--ink-3);padding:5px 11px;}
  tbody tr.tot-row{background:var(--paper-3);border-top:2px solid var(--paper-3);}
  tbody tr.tot-row td{font-weight:700;}
  td{padding:7px 11px;vertical-align:middle;}
  td.r{text-align:right;font-variant-numeric:tabular-nums;}
  td.pos{color:var(--green);} td.neg{color:var(--accent);} td.dim{color:var(--ink-3);}

  /* -- BADGES -- */
  .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
  .badge-green{background:rgba(42,122,78,0.1);color:var(--green);}
  .badge-red{background:rgba(168,0,0,0.08);color:var(--accent);}
  .badge-amber{background:rgba(184,112,0,0.10);color:var(--amber);}
  .badge-blue{background:rgba(30,90,140,0.10);color:var(--blue);}
  .badge-gray{background:var(--paper-3);color:var(--ink-3);}

  /* -- PROGRESS -- */
  .prog-wrap{background:var(--paper-3);height:5px;border-radius:3px;overflow:hidden;min-width:50px;}
  .prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.3s;}
  .prog-fill.ok{background:var(--green);} .prog-fill.warn{background:var(--amber);} .prog-fill.over{background:var(--accent);}

  /* -- FORM -- */
  .field{margin-bottom:12px;}
  .field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-2);display:block;margin-bottom:5px;}
  input[type=text],input[type=number],input[type=date],input[type=email],textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--paper-3);border-radius:var(--radius-sm);font-size:14px;font-family:'Arial Narrow',Arial,sans-serif;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{min-height:70px;resize:vertical;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:480px){.form-grid{grid-template-columns:1fr;}}

  /* -- BIG BTN -- */
  .big-btn{width:100%;padding:14px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Arial Narrow',Arial,sans-serif;border:none;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s;}
  .big-btn.primary{background:var(--accent);color:#fff;}
  .big-btn.secondary{background:var(--paper-2);color:var(--ink);}
  .big-btn.success{background:var(--green);color:#fff;}
  .big-btn:active{transform:scale(0.98);}

  /* -- ADD BTN -- */
  .add-btn{width:100%;padding:9px;border:2px dashed var(--paper-3);border-radius:var(--radius-sm);background:transparent;color:var(--ink-3);font-size:12px;font-family:'Arial Narrow',Arial,sans-serif;cursor:pointer;margin-bottom:8px;}

  /* -- INLINE ACTION BTN -- */
  .act-btn{background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:18px;padding:2px 5px;line-height:1;}
  .act-btn:hover{color:var(--accent);}
  .act-btn.ok{color:var(--green);}

  /* -- BESPRECHUNG CARD -- */
  .bspr-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--paper-3);padding:12px 14px;margin-bottom:10px;}
  .bspr-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
  .bspr-title{font-size:13px;font-weight:700;}
  .bspr-beschl{font-size:12px;background:var(--paper-2);border-radius:4px;padding:8px 10px;line-height:1.6;color:var(--ink-2);}

  /* -- TIMELINE -- */
  .tl-row{display:flex;align-items:stretch;border-bottom:1px solid var(--paper-3);}
  .tl-row:last-child{border-bottom:none;}
  .tl-row:hover{background:var(--paper-2);}
  .tl-date{width:80px;flex-shrink:0;padding:8px 10px;font-size:10px;color:var(--ink-3);font-weight:600;border-right:1px solid var(--paper-3);display:flex;align-items:center;}
  .tl-dot-col{width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--paper-3);}
  .tl-dot{width:8px;height:8px;border-radius:50%;border:2px solid currentColor;background:var(--card);}
  .tl-body{flex:1;padding:8px 12px;}
  .tl-title{font-size:12px;font-weight:700;}
  .tl-desc{font-size:11px;color:var(--ink-3);margin-top:1px;}
  .tl-right{padding:8px 11px;font-size:12px;display:flex;align-items:center;white-space:nowrap;color:var(--ink-2);font-weight:700;flex-shrink:0;}

  /* -- GAUGE -- */
  .gauge-row{margin-bottom:10px;padding:0 14px;}
  .gauge-head{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}

  /* -- BAR CHART -- */
  .bar-chart{display:flex;gap:6px;align-items:flex-end;padding:14px;}
  .bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
  .bar-stack{display:flex;flex-direction:column;justify-content:flex-end;width:100%;flex:1;gap:1px;}
  .bar-seg{min-height:2px;position:relative;border-radius:2px 2px 0 0;}
  .bar-seg:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:3px 8px;font-size:10px;white-space:nowrap;z-index:30;border-radius:4px;pointer-events:none;}
  .bar-label{font-size:9px;color:var(--ink-3);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
  .chart-legend{display:flex;flex-wrap:wrap;gap:5px 12px;padding:0 14px 12px;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-3);font-weight:600;}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

  /* -- TWO/THREE COL -- */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:600px){.two-col,.three-col{grid-template-columns:1fr;}}

  /* -- EMPTY -- */
  .empty{text-align:center;padding:30px 20px;color:var(--ink-3);}
  .empty-text{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;}

  /* -- TOAST -- */
  .toast{position:fixed;bottom:calc(var(--safe-bottom) + 80px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* -- MODAL -- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;padding-bottom:var(--safe-bottom);animation:fadeIn 0.2s ease;}
  .modal-overlay.hidden{display:none;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-sheet{background:var(--paper);border-radius:20px 20px 0 0;width:100%;padding:20px 16px 24px;animation:slideUp 0.25s ease;max-height:90vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(40px)}to{transform:none}}
  .modal-handle{width:40px;height:4px;background:var(--paper-3);border-radius:2px;margin:-10px auto 16px;}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:14px;font-family:'Arial Narrow',Arial,sans-serif;}

  /* -- CONTACT LINK -- */
  a.tel-link{color:var(--blue);text-decoration:none;font-weight:600;}
  a.mail-link{color:var(--blue);text-decoration:none;}
</style>
</head>

<header>

    <div class="header-logo-row">

function pct(a,b){return b?((a-b)/b*100):null;}
function pS(a,b){var q=pct(a,b);if(q===null)return'-';return(q>0?'+':'')+q.toFixed(1)+'%';}
function pC(a,b){var q=pct(a,b);if(q===null)return'dim';return q>3?'neg':q<-3?'pos':'dim';}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function el(id){return document.getElementById(id);}
function td(t){return new Date().toISOString().slice(0,10);}
function daysDiff(a,b){return Math.round((new Date(b)-new Date(a))/(86400000));}
function prC(r){return r>1.05?'over':r>0.88?'warn':'ok';}

/* NAV */
function buildTabs(){
  var tb=el('tabBar');tb.innerHTML='';
  TABS.forEach(function(t){
    var b=document.createElement('button');b.className='tab'+(t.id===cv?' active':'');
    b.textContent=t.label;b.onclick=(function(id){return function(){switchTab(id);};})(t.id);
    tb.appendChild(b);
  });
}
function switchTab(id){cv=id;buildTabs();renderMain();}
function switchProject(idx){cp=parseInt(idx);el('headerSub').textContent=' - '+p().name;renderKPI();renderMain();}

/* KPI */
function renderKPI(){
  var pr=p();
  var sch=sm(pr.kosten_sch,'n'),ber=sm(pr.kosten_ber,'n');
  var auftr=pr.angebote.filter(function(a){return a.st==='beauftragt';});
  var verg=sm(auftr,'n');
  var rech=sm(pr.rechnungen,'n');
  var bez=sm(pr.rechnungen.filter(function(r){return r.st==='bezahlt';}),'n');
  var nt=sm(pr.nachtraege.filter(function(n){return n.st==='beauftragt';}),'n');
  var mo=pr.maengel.filter(function(m){return m.st==='offen';}).length;
  var strip=el('kpiStrip')||document.createElement('div');
  function kpi(l,v,d,dc){return '<div class="kpi-item"><div class="kpi-label">'+l+'</div><div class="kpi-value">'+v+'</div>'+(d?'<div class="kpi-delta '+(dc||'')+'">'+d+'</div>':'')+'</div>';}
  strip.innerHTML=
    kpi('Kostenschaetzung',fmtK(sch),'LP 1-2 DIN 276','')+
    kpi('Kostenberechnung',ber?fmtK(ber):'-',ber?pS(ber,sch)+' gg.Sch.':'',(ber&&sch)?pC(ber,sch):'')+
    kpi('Vergabe',verg?fmtK(verg):'-',verg?pS(verg,ber||sch)+' gg.Ber.':'',(verg&&ber)?pC(verg,ber):'')+
    kpi('Rechnungen',rech?fmtK(rech):'-',bez&&rech?Math.round(bez/rech*100)+'% bez.':'')+
    kpi('Nachträge',nt?fmtK(nt):'-',pr.nachtraege.length+' gesamt','')+
    kpi('Off. Mängel',mo,mo>0?'In Bearbeitung':'Alle behoben',mo>0?'neg':'pos');
}

/* MAIN RENDER */
function renderMain(){
  var mc=el('mainContent');mc.innerHTML='';
  if(cv==='dashboard')   renderDashboard(mc);
  else if(cv==='kosten') renderKosten(mc);
  else if(cv==='termine')renderTermine(mc);
  else if(cv==='nachtraege')renderNachträge(mc);
  else if(cv==='maengel')renderMängel(mc);
  else if(cv==='besprechungen')renderBesprechungen(mc);
  else if(cv==='beteiligte')renderBeteiligte(mc);
  else if(cv==='honorar')renderHonorar(mc);
  else if(cv==='kennzahlen')renderKennzahlen(mc);
  else if(cv==='projekte')renderProjekte(mc);
  else if(cv==='einstellungen')renderEinstellungen(mc);
}

/* -- HELPERS -- */
function secLabel(mc,txt){var d=document.createElement('p');d.className='sec-label';d.textContent=txt;mc.appendChild(d);}
function addBtn(mc,lbl,fn){var b=document.createElement('button');b.className='big-btn secondary';b.style.marginTop='4px';b.textContent=lbl;b.onclick=fn;mc.appendChild(b);}
function card(mc,titleTxt,btnLbl,btnFn){
  var c=document.createElement('div');c.className='card';
  if(titleTxt||btnLbl){
    var h=document.createElement('div');h.className='card-header';
    h.innerHTML='<span class="card-title">'+(titleTxt||'')+'</span>';
    if(btnLbl){var b=document.createElement('button');b.className='header-btn';b.style.cssText='font-size:11px;padding:5px 10px;';b.textContent=btnLbl;b.onclick=btnFn;h.appendChild(b);}
    c.appendChild(h);
  }
  mc.appendChild(c);return c;
}
function tbl(card,heads,rows){
  var w=document.createElement('div');w.className='tbl-wrap';
  var t=document.createElement('table');
  var th=document.createElement('thead');var tr=document.createElement('tr');
  heads.forEach(function(h){var td=document.createElement('th');td.innerHTML=h.l;if(h.r)td.className='r';if(h.w)td.style.width=h.w;tr.appendChild(td);});
  th.appendChild(tr);t.appendChild(th);
  var tb=document.createElement('tbody');rows.forEach(function(r){tb.appendChild(r);});
  t.appendChild(tb);w.appendChild(t);card.appendChild(w);return tb;
}
function mkTr(cells,cls){
  var tr=document.createElement('tr');if(cls)tr.className=cls;
  cells.forEach(function(c){var td=document.createElement('td');td.innerHTML=c.v||'';if(c.cls)td.className=c.cls;if(c.st)td.style.cssText=c.st;tr.appendChild(td);});return tr;}
function badge(txt,cls){return '<span class="badge '+cls+'">'+txt+'</span>';}
function tlRow(dat,color,title,desc,right,c){
  var r=document.createElement('div');r.className='tl-row';
  r.innerHTML='<div class="tl-date">'+dat+'</div><div class="tl-dot-col"><div class="tl-dot" style="color:'+color+'"></div></div><div class="tl-body"><div class="tl-title">'+title+'</div><div class="tl-desc">'+desc+'</div></div><div class="tl-right">'+right+'</div>';
  c.appendChild(r);}
function gwToKG(gw){var g=gw.toLowerCase();return g.indexOf('rohbau')>=0||g.indexOf('umbau')>=0?'300':g.indexOf('heizung')>=0||g.indexOf('sanitaer')>=0||g.indexOf('elektro')>=0?'400':g.indexOf('aussen')>=0?'500':'300';}
function progRow(wrap,lbl,val,base,color){
  var ratio=base?val/base:0;
  var row=document.createElement('div');row.className='gauge-row';
  row.innerHTML='<div class="gauge-head"><span>'+lbl+'</span><span>'+fmtK(val)+'</span></div><div class="prog-wrap"><div class="prog-fill '+prC(ratio)+'" style="width:'+Math.min(100,ratio*100)+'%;background:'+color+'"></div></div>';
  wrap.appendChild(row);}

/* ==========================================
   DASHBOARD
========================================== */
function renderDashboard(mc){
  var pr=p();
  var sch=sm(pr.kosten_sch,'n'),ber=sm(pr.kosten_ber,'n');
  var auftr=pr.angebote.filter(function(a){return a.st==='beauftragt';});
  var verg=sm(auftr,'n'),rech=sm(pr.rechnungen,'n');
  var bez=sm(pr.rechnungen.filter(function(r){return r.st==='bezahlt';}),'n');
  var nt=sm(pr.nachtraege.filter(function(n){return n.st==='beauftragt';}),'n');

  // Chart row
  var twoCol=document.createElement('div');twoCol.className='two-col';mc.appendChild(twoCol);

  // Bar chart
  var cc=card(twoCol,'Kostenentwicklung');
  var bc=document.createElement('div');bc.className='bar-chart';bc.style.height='90px';
  var vals=[['Schaetz.',sch,'#b8d0e8'],['Berechn.',ber,'#5b8ab5'],['Vergabe',verg,'#2a7a4e'],['Rechnung',rech,'#A80000']];
  var maxV=Math.max.apply(null,vals.map(function(v){return v[1]||0;}))||1;
  vals.forEach(function(item){
    var bg=document.createElement('div');bg.className='bar-group';
    var st=document.createElement('div');st.className='bar-stack';
    var s=document.createElement('div');s.className='bar-seg';s.style.background=item[2];s.style.flex=(item[1]||0)/maxV;s.setAttribute('data-tip',item[0]+': '+fmt(item[1]));
    st.appendChild(s);var lbl=document.createElement('div');lbl.className='bar-label';lbl.textContent=item[0];
    bg.appendChild(st);bg.appendChild(lbl);bc.appendChild(bg);});
  cc.appendChild(bc);
  var leg=document.createElement('div');leg.className='chart-legend';
  [['#b8d0e8','Schaetzung'],['#5b8ab5','Berechnung'],['#2a7a4e','Vergabe'],['#A80000','Rechnung']].forEach(function(l){
    leg.innerHTML+='<div class="legend-item"><div class="legend-dot" style="background:'+l[0]+'"></div>'+l[1]+'</div>';});
  cc.appendChild(leg);

  // Gauge
  var gc=card(twoCol,'Budget-Auslastung');
  var base=ber||sch||1;
  [['Berechnung',ber,'#5b8ab5'],['Vergabe+NT',verg+nt,'#2a7a4e'],['Rechnungen',rech,'#A80000'],['Bezahlt',bez,'#4caf7d']].forEach(function(g){if(g[1])progRow(gc,g[0],g[1],base,g[2]);});

  // LP status
  secLabel(mc,'Leistungsphasen');
  var lpCard=card(mc);var lpBody=document.createElement('div');lpBody.style.padding='12px 16px';
  pr.termine.forEach(function(t){
    var cls=t.st==='abgeschlossen'?'badge-green':t.st==='laufend'?'badge-amber':'badge-gray';
    var row=document.createElement('div');row.style.cssText='margin-bottom:10px;';
    var verz='';if(t.se&&t.ie){var d=daysDiff(t.se,t.ie);verz=d>0?' <span style="color:var(--accent);font-size:10px;">+'+d+'d Verzoegerung</span>':'';}
    row.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:13px;font-weight:700;">LP '+t.lp+' - '+t.bez+'</span><span class="badge '+cls+'">'+t.st+'</span></div><div style="font-size:11px;color:var(--ink-3);">Soll: '+t.ss+' bis '+t.se+(t.ie?' | Ist: '+t.ie:'')+verz+'</div>';
    lpBody.appendChild(row);});
  if(!pr.termine.length)lpBody.innerHTML='<div class="empty"><div class="empty-text">Noch keine Termine</div></div>';
  lpCard.appendChild(lpBody);

  // Recent
  secLabel(mc,'Letzte Aktivitaeten');
  var actCard=card(mc);var events=[];
  pr.rechnungen.forEach(function(r){events.push({d:r.dat,c:r.st==='bezahlt'?'#2a7a4e':'#A80000',t:r.nr+' - '+r.firma,s:fmt(r.n)+' / '+r.st,r:badge(r.st==='bezahlt'?'Bezahlt':r.st==='offen'?'Offen':'Teil','badge-'+(r.st==='bezahlt'?'green':r.st==='offen'?'red':'amber'))});});
  pr.besprechungen.forEach(function(b){events.push({d:b.dat,c:'#1e5a8c',t:b.titel,s:b.teiln,r:badge('Besprechung','badge-blue')});});
  pr.maengel.filter(function(m){return m.st==='offen';}).forEach(function(m){events.push({d:m.dat,c:'#A80000',t:'Mangel: '+m.gw,s:m.bez,r:badge('Offen','badge-red')});});
  events.sort(function(a,b){return b.d>a.d?1:-1;}).slice(0,8).forEach(function(ev){tlRow(ev.d,ev.c,ev.t,ev.s,ev.r,actCard);});
  if(!events.length)actCard.innerHTML='<div class="empty"><div class="empty-text">Noch keine Aktivitaeten</div></div>';
}

/* ==========================================
   KOSTEN
========================================== */
function renderKosten(mc){
  var pr=p();
  // Vergleichstabelle
  secLabel(mc,'Kostenvergleich DIN 276');
  var cmp=card(mc);
  var kgs={};
  function addK(arr,f){arr.forEach(function(it){if(!kgs[it.kg])kgs[it.kg]={s:0,b:0,v:0,nt:0,r:0};kgs[it.kg][f]+=it.n||0;});}
  addK(pr.kosten_sch,'s');addK(pr.kosten_ber,'b');
  pr.angebote.filter(function(a){return a.st==='beauftragt';}).forEach(function(a){var kg=gwToKG(a.gw);if(!kgs[kg])kgs[kg]={s:0,b:0,v:0,nt:0,r:0};kgs[kg].v+=a.n;});
  pr.nachtraege.filter(function(n){return n.st==='beauftragt';}).forEach(function(n){var kg=gwToKG(n.gw);if(!kgs[kg])kgs[kg]={s:0,b:0,v:0,nt:0,r:0};kgs[kg].nt+=n.n;});
  pr.rechnungen.forEach(function(r){var kg=gwToKG(r.gw);if(!kgs[kg])kgs[kg]={s:0,b:0,v:0,nt:0,r:0};kgs[kg].r+=r.n;});
  var tot={s:0,b:0,v:0,nt:0,r:0};var rows=[];
  Object.keys(kgs).sort().forEach(function(kg){var v=kgs[kg];Object.keys(tot).forEach(function(k){tot[k]+=v[k];});
    var base=v.b||v.s;var curr=v.r||v.v||v.b||v.s;var rat=base?curr/base:0;
    rows.push(mkTr([{v:'<strong>'+kg+'</strong>'},{v:KG[kg]||'-'},{v:v.s?fmt(v.s):'-',cls:'r'},{v:v.b?fmt(v.b):'-',cls:'r'},{v:v.v?fmt(v.v):'-',cls:'r'},{v:v.nt?badge('+'+fmt(v.nt),'badge-amber'):'-',cls:'r'},{v:v.r?fmt(v.r):'-',cls:'r'},{v:'<span class="'+pC(curr,base)+'">'+pS(curr,base)+'</span>',cls:'r'},{v:'<div class="prog-wrap"><div class="prog-fill '+prC(rat)+'" style="width:'+Math.min(100,rat*100)+'%"></div></div>'}]));});
  var tBase=tot.b||tot.s;var tCurr=tot.r||tot.v||tot.b;
  rows.push(mkTr([{v:'<strong>GESAMT</strong>'},{v:''},{v:'<strong>'+fmt(tot.s)+'</strong>',cls:'r'},{v:'<strong>'+fmt(tot.b)+'</strong>',cls:'r'},{v:'<strong>'+fmt(tot.v)+'</strong>',cls:'r'},{v:tot.nt?'<strong>+'+fmt(tot.nt)+'</strong>':'-',cls:'r'},{v:'<strong>'+fmt(tot.r)+'</strong>',cls:'r'},{v:'<strong><span class="'+pC(tCurr,tBase)+'">'+pS(tCurr,tBase)+'</span></strong>',cls:'r'},{v:''}],'tot-row'));
  tbl(cmp,[{l:'KGR',w:'48px'},{l:'Bezeichnung'},{l:'Schaetzung',r:true,w:'100px'},{l:'Berechnung',r:true,w:'100px'},{l:'Vergabe',r:true,w:'100px'},{l:'Nachträge',r:true,w:'100px'},{l:'Rechnung',r:true,w:'100px'},{l:'Abw.%',r:true,w:'60px'},{l:'Stand',w:'70px'}],rows);

  // Angebote
  secLabel(mc,'Angebote / Bietervergleich');
  var ac=card(mc,null,'+ Angebot',function(){openModal('angebot');});
  var gwMap={};pr.angebote.forEach(function(a){if(!gwMap[a.gw])gwMap[a.gw]=[];gwMap[a.gw].push(a);});
  var aRows=[];
  Object.keys(gwMap).forEach(function(gw){
    aRows.push(mkTr([{v:gw}],'grp-row'));
    var items=gwMap[gw].slice().sort(function(a,b){return a.n-b.n;});var minN=items[0].n;
    items.forEach(function(a){var ri=pr.angebote.indexOf(a);
      var sb=a.st==='beauftragt'?badge('Beauftragt','badge-green'):a.st==='abgelehnt'?badge('Abgelehnt','badge-gray'):badge('Prüfung','badge-amber');
      aRows.push(mkTr([{v:gw},{v:(a.n===minN?'<strong>':'')+a.firma+(a.n===minN?'</strong>':'')},{v:a.dat||'-',cls:'dim'},{v:sb},{v:fmt(a.n),cls:'r'},{v:fmt(br(a.n)),cls:'r dim'},{v:a.n>minN?'<span class="neg">+'+fmt(a.n-minN)+'</span>':'-',cls:'r'},{v:'<button class="act-btn" onclick="del(\'angebote\','+ri+')">&#215;</button>',st:'text-align:right'}]));});});
  if(!aRows.length)aRows.push(mkTr([{v:'<div class="empty"><div class="empty-text">Noch keine Angebote</div></div>'}]));
  tbl(ac,[{l:'Gewerk'},{l:'Firma'},{l:'Datum',w:'85px'},{l:'Status',w:'95px'},{l:'Netto',r:true,w:'105px'},{l:'Brutto',r:true,w:'100px'},{l:'vs.Min.',r:true,w:'100px'},{l:'',w:'30px'}],aRows);

  // Rechnungen
  secLabel(mc,'Rechnungen');
  var rc=card(mc,null,'+ Rechnung',function(){openModal('rechnung');});
  var rRows=[];var rTot=0,rBez=0;var tod=new Date().toISOString().slice(0,10);
  pr.rechnungen.forEach(function(r,i){rTot+=r.n;if(r.st==='bezahlt')rBez+=r.n;
    var ov=r.st!=='bezahlt'&&r.faell<tod;
    var sb=r.st==='bezahlt'?badge('Bezahlt','badge-green'):r.st==='offen'?badge('Offen','badge-red'):badge('Teilbez.','badge-amber');
    var tr=mkTr([{v:'<strong>'+r.nr+'</strong>'},{v:r.firma},{v:r.dat,cls:'dim'},{v:'<span class="'+(ov?'neg':'dim')+'">'+r.faell+(ov?' !':'')+'</span>'},{v:sb},{v:fmt(r.n),cls:'r'},{v:'<div style="display:flex;gap:4px;justify-content:flex-end;">'+(r.st!=='bezahlt'?'<button class="act-btn ok" onclick="markBez('+i+')">&#10003;</button>':'')+'<button class="act-btn" onclick="del(\'rechnungen\','+i+')">&#215;</button></div>',st:'text-align:right;'}]);
    if(ov)tr.style.background='rgba(168,0,0,0.04)';rRows.push(tr);});
  if(!rRows.length)rRows.push(mkTr([{v:'<div class="empty"><div class="empty-text">Noch keine Rechnungen</div></div>'}]));
  else rRows.push(mkTr([{v:'<strong>GESAMT</strong>'},{v:''},{v:''},{v:''},{v:''},{v:'<strong>'+fmt(rTot)+'</strong>',cls:'r'},{v:'<span style="font-size:10px;color:var(--ink-3)">Bez.: '+fmt(rBez)+'</span>',st:'text-align:right'}],'tot-row'));
  tbl(rc,[{l:'Re-Nr.',w:'75px'},{l:'Firma'},{l:'Datum',w:'85px'},{l:'Fälligkeit',w:'95px'},{l:'Status',w:'90px'},{l:'Netto',r:true,w:'105px'},{l:'',w:'70px'}],rRows);
}

/* ==========================================
   TERMINE
========================================== */

  pr.termine.forEach(function(t,i){
    var cls=t.st==='abgeschlossen'?'badge-green':t.st==='laufend'?'badge-amber':'badge-gray';

    if(t.se&&t.ie){var d=daysDiff(t.se,t.ie);verz=d>0?'<span class="neg">+'+d+'d</span>':d<0?'<span class="pos">'+d+'d</span>':'-';}

  if(!rows.length)rows.push(mkTr([{v:'<div class="empty"><div class="empty-text">Noch keine Termine</div></div>'}]));

}

/* ==========================================
   MAENGEL
========================================== */
function renderMängel(mc){
  var pr=p();secLabel(mc,'Mängelliste');

function exportPDF(){
  var pr=p();

  var buero=settings.buero||'desch architekten+ingenieure';
  var bearbeiter=settings.name||'';
  var heute=new Date().toLocaleDateString('de-DE');

  var sch=sm(pr.kosten_sch,'n'),ber=sm(pr.kosten_ber,'n');
  var auftr=pr.angebote.filter(function(a){return a.st==='beauftragt';});
  var verg=sm(auftr,'n');
  var rech=sm(pr.rechnungen,'n');
  var bez=sm(pr.rechnungen.filter(function(r){return r.st==='bezahlt';}),'n');
  var nt=sm(pr.nachtraege.filter(function(n){return n.st==='beauftragt';}),'n');
  var mo=pr.maengel.filter(function(m){return m.st==='offen';}).length;

  function fmtRow(cells){return '<tr>'+cells.map(function(c){return '<td style="padding:4px 8px;border-bottom:1px solid #e8e4de;font-size:11pt;">'+c+'</td>';}).join('')+'</tr>';}
  function section(title){return '<tr><td colspan="4" style="background:#A80000;color:white;padding:6px 8px;font-size:10pt;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;">'+title+'</td></tr>';}

  var kostenRows='';
  var kgAll={};
  pr.kosten_sch.forEach(function(it){if(!kgAll[it.kg])kgAll[it.kg]={s:0,b:0};kgAll[it.kg].s+=it.n;});
  pr.kosten_ber.forEach(function(it){if(!kgAll[it.kg])kgAll[it.kg]={s:0,b:0};kgAll[it.kg].b+=it.n;});
  Object.keys(kgAll).sort().forEach(function(kg){
    var v=kgAll[kg];
    kostenRows+=fmtRow([kg+' '+KG[kg],fmt(v.s),fmt(v.b)||'-',fmt(v.b||v.s)]);
  });
  kostenRows+=fmtRow(['<strong>GESAMT</strong>','<strong>'+fmt(sch)+'</strong>','<strong>'+fmt(ber)+'</strong>','']);

  var rechnRows='';

  });
  if(!pr.rechnungen.length)rechnRows=fmtRow(['Keine Rechnungen','','','']);

  var maengelRows='';
  pr.maengel.forEach(function(m){
    maengelRows+=fmtRow([m.gw,m.bez,m.frist,m.st==='behoben'?'Behoben':'Offen']);
  });
  if(!pr.maengel.length)maengelRows=fmtRow(['Keine Mängel','','','']);

  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Projektsteuerung - '+pr.name+'</title>'+
  '<style>'+
  'body{font-family:"Arial Narrow",Arial,sans-serif;font-size:12pt;color:#1a1a1a;margin:0;padding:0;}'+
  '@media print{@page{size:A4 portrait;margin:15mm 12mm 12mm 15mm;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}'+
  '.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #A80000;padding-bottom:8px;margin-bottom:16px;}'+
  '.brand{font-size:22pt;font-weight:700;color:#A80000;letter-spacing:-0.5px;}'+
  '.brand-sub{font-size:9pt;color:#888;letter-spacing:0.1em;text-transform:uppercase;}'+
  '.hdr-right{text-align:right;font-size:9pt;color:#888;}'+
  '.proj-title{font-size:16pt;font-weight:700;margin-bottom:2px;}'+
  '.proj-meta{font-size:9pt;color:#888;margin-bottom:14px;}'+
  '.kpi-row{display:flex;gap:0;border:1px solid #e8e4de;margin-bottom:16px;}'+
  '.kpi{flex:1;padding:8px 10px;border-right:1px solid #e8e4de;}'+
  '.kpi:last-child{border-right:none;}'+
  '.kpi-l{font-size:7pt;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:2px;}'+
  '.kpi-v{font-size:13pt;font-weight:700;}'+
  'table{width:100%;border-collapse:collapse;margin-bottom:16px;}'+
  'thead th{background:#A80000;color:white;padding:5px 8px;text-align:left;font-size:9pt;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}'+
  '.footer{margin-top:20px;border-top:1px solid #e8e4de;padding-top:8px;font-size:8pt;color:#aaa;display:flex;justify-content:space-between;}'+
  '</style></head><body>'+
  '<div class="hdr"><div><div class="brand">desch</div><div class="brand-sub">architekten+ingenieure</div></div><div class="hdr-right"><div>PROJEKTSTEUERUNG</div><div>'+heute+'</div>'+(bearbeiter?'<div>'+bearbeiter+'</div>':'')+'</div></div>'+
  '<div class="proj-title">'+pr.name+'</div>'+
  '<div class="proj-meta">Nr. '+pr.nr+' &nbsp;|&nbsp; Bauherr: '+pr.bh+'&nbsp;|&nbsp; '+pr.start+' &ndash; '+pr.end+'</div>'+
  '<div class="kpi-row">'+
    '<div class="kpi"><div class="kpi-l">Kostenschaetzung</div><div class="kpi-v">'+fmtK(sch)+'</div></div>'+

  section('Kosten nach Kostengruppe')+kostenRows+'</tbody></table>'+

  section('Rechnungen')+rechnRows+'</tbody></table>'+

  '</body></html>');

function exportCSV(){
  var pr=p();
  var lines=[];
  function row(cells){
    return cells.map(function(c){
      var v=String(c==null?'':c);
      if(v.indexOf(';')>=0||v.indexOf('"')>=0){v='"'+v.replace(/"/g,'""')+'"';}
      return v;
    }).join(';');
  }
  lines.push(row(['PROJEKTSTEUERUNG',pr.name]));
  lines.push(row(['Projektnummer',pr.nr,'Bauherr',pr.bh]));
  lines.push(row(['Laufzeit',pr.start+' bis '+pr.end,'Budget',pr.budget,'Honorar',pr.honorar]));
  lines.push('');
  lines.push(row(['KOSTENSCHAETZUNG']));
  lines.push(row(['KGR','Bezeichnung','Bemerkung','Netto EUR','Brutto EUR']));
  pr.kosten_sch.forEach(function(it){lines.push(row([it.kg,it.bez,it.bem,it.n,(it.n*1.19).toFixed(2)]));});
  lines.push('');
  lines.push(row(['KOSTENBERECHNUNG']));
  lines.push(row(['KGR','Bezeichnung','Bemerkung','Netto EUR','Brutto EUR']));
  pr.kosten_ber.forEach(function(it){lines.push(row([it.kg,it.bez,it.bem,it.n,(it.n*1.19).toFixed(2)]));});
  lines.push('');
  lines.push(row(['ANGEBOTE']));
  lines.push(row(['Gewerk','Firma','Datum','Status','Netto EUR','Brutto EUR']));
  pr.angebote.forEach(function(a){lines.push(row([a.gw,a.firma,a.dat,a.st,a.n,(a.n*1.19).toFixed(2)]));});
  lines.push('');
  lines.push(row(['RECHNUNGEN']));
  lines.push(row(['Re-Nr.','Firma','Gewerk','Datum','Fälligkeit','Status','Netto EUR']));
  pr.rechnungen.forEach(function(r){lines.push(row([r.nr,r.firma,r.gw,r.dat,r.faell,r.st,r.n]));});
  lines.push('');
  lines.push(row(['NACHTRAEGE']));
  lines.push(row(['Gewerk','Firma','Datum','Beschreibung','Ursache','Status','Netto EUR']));
  pr.nachtraege.forEach(function(n){lines.push(row([n.gw,n.firma,n.dat,n.bez,n.urs,n.st,n.n]));});
  lines.push('');
  lines.push(row(['MAENGEL']));
  lines.push(row(['Gewerk','Firma','Datum','Beschreibung','Schwere','Frist','Status']));
  pr.maengel.forEach(function(m){lines.push(row([m.gw,m.firma,m.dat,m.bez,m.schw,m.frist,m.st]));});
  lines.push('');
  lines.push(row(['BETEILIGTE']));
  lines.push(row(['Name','Rolle','Kontakt','Telefon','E-Mail']));
  pr.beteiligte.forEach(function(b){lines.push(row([b.name,b.rolle,b.kont,b.tel,b.mail]));});
  var bom='\uFEFF';
  var crlf=String.fromCharCode(13,10);var blob=new Blob([bom+lines.join(crlf)],{type:'text/csv;charset=utf-8;'});

  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='PS_'+pr.name.replace(/[^a-zA-Z0-9]/g,'_')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSV exportiert');
}

function exportJSON(){
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='desch_projektsteuerung_backup.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup exportiert');
}

function importJSON(){document.getElementById('importFile').click();}
function doImport(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(Array.isArray(imported)){
        data=imported;save();
        var sel=document.getElementById('projectSelect');
        sel.innerHTML='';
        data.forEach(function(pr,i){var o=document.createElement('option');o.value=i;o.textContent=pr.name;sel.appendChild(o);});
        cp=0;renderKPI();renderMain();toast('Backup importiert');
      } else {toast('Ungueltige Datei');}
    } catch(e){toast('Fehler beim Import');}
  };
  reader.readAsText(file);
}
